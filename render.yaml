# Render Blueprint — one Docker web service for FlakyLens.
# Deploy: connect this repo in Render; it builds ./Dockerfile and runs the app.
services:
  - type: web
    name: flakylens
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      # Provider keys. Values are set manually in the Render dashboard, never in
      # git (sync: false). Supply at least one; the app prefers them in this
      # order: OpenAI, then GitHub Models, then OpenRouter.
      - key: OPENAI_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
